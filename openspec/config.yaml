schema: spec-driven
locale: en

context: |
  ## Architecture

  MacLaw: macOS-native AI agent runtime (Swift)
  Target: Any Mac (Apple Silicon, macOS 14+)
  Current deployment: PsychQuantClaw Mac Mini, but must be portable to any Mac.

  ## Design Principles

  1. **Delegate to CLI, don't reimplement**: When a capable CLI tool exists (codex, claude, gh, brew),
     shell out to it via Process instead of reimplementing its functionality. The CLI handles auth,
     model routing, rate limiting, and updates. MacLaw is a bridge/orchestrator, not a replacement.

  2. **macOS-native security**: Use Keychain for secrets, XPC for isolation (v2), launchd for lifecycle.
     Never store secrets as plaintext files.

  3. **Apple networking stack**: Use URLSession + NWPathMonitor for all network operations.
     Never use third-party HTTP libraries. The OS handles IPv4/IPv6, sleep/wake, VPN transparently.

  4. **Zero external Swift dependencies** (except swift-argument-parser for CLI):
     URLSession over Alamofire, Security.framework over custom crypto, Foundation over SwiftyJSON.

  5. **Portable across Macs**: All commands must work on any Mac, not just PsychQuantClaw.
     - No hardcoded IPs, hostnames, paths, or machine-specific values
     - All machine-specific config comes from ~/.maclaw/maclaw.json or Keychain
     - Paths use $HOME or FileManager.homeDirectoryForCurrentUser, never absolute paths
     - Port numbers are configurable, not hardcoded
     - `maclaw setup` is the only entry point for first-time configuration
     - CLI tools (codex, etc.) are found via PATH, not absolute path

  ## Tech Stack

  - Swift 6.0, macOS 14+, Apple Silicon
  - swift-argument-parser (CLI only)
  - Telegram Bot API via raw URLSession + Codable
  - LLM via `codex exec` CLI (not direct API calls)
